services:

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "${JELLYFIN_PORT}:8096"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ${MEDIA_DIR}:/media
    devices:
      - /dev/dri:/dev/dri
    networks:
      - media-net

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBIT_PORT}
    ports:
      - "${QBIT_PORT}:${QBIT_PORT}"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - qbit-config:/config
      - ${MEDIA_DIR}/downloads:/downloads
      - ./qbittorrent.conf:/config/qBittorrent/qBittorrent.conf
    networks:
      - media-net

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "${FILEBROWSER_PORT}:80"
    volumes:
      - ${MEDIA_DIR}/downloads:/srv
      - ${MEDIA_DIR}/.filebrowser:/database
    networks:
      - media-net



networks:
  media-net:
    driver: bridge

volumes:
  jellyfin-config:
  jellyfin-cache:
  qbit-config:
